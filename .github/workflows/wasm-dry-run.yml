name: Build WASM Package

on:
  workflow_call:
    inputs:
      upload_artifact:
        description: "Upload the generated pkg directory as a workflow artifact."
        required: false
        type: boolean
        default: false
      artifact_name:
        description: "Artifact name to use when upload_artifact is enabled."
        required: false
        type: string
        default: "ftaql-wasm-pkg"

jobs:
  build_ftaql_wasm_dry_run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build scoped WASM package
        working-directory: crates/ftaql-wasm
        run: |
          rm -rf pkg
          wasm-pack build --target web --scope piklv

      - name: Verify generated npm package metadata
        working-directory: crates/ftaql-wasm/pkg
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          package_json = json.loads(Path("package.json").read_text())
          cargo_toml = Path("../Cargo.toml").read_text()
          match = re.search(r'^version = "([^"]+)"$', cargo_toml, re.MULTILINE)
          assert match is not None, "Could not determine version from Cargo.toml"
          expected_version = match.group(1)
          assert package_json["name"] == "@piklv/ftaql-wasm", package_json["name"]
          assert package_json["version"] == expected_version, package_json["version"]
          assert Path("ftaql_wasm.js").exists(), "ftaql_wasm.js missing"
          assert Path("ftaql_wasm_bg.wasm").exists(), "ftaql_wasm_bg.wasm missing"
          print("WASM dry-run package looks correct")
          PY

      - name: Upload generated WASM package
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: crates/ftaql-wasm/pkg/*
